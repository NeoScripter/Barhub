name: deploy

on:
  push:
    branches:
      - develop
      - main
  # workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: 144.31.68.92
          port: 22
          username: ilya
          key: ${{ secrets.PRIVATE_KEY }}
          script_stop: true
          script: |
            zsh -c "
            cd www/lk.barhub.ru && \
            git pull origin main && \
            composer install && \
            rm -rf storage/wayfinder-cache && \
            rm -rf storage/framework/surveyor && \
            rm -rf storage/framework/cache && \
            rm -rf bootstrap/cache && \
            mkdir -p bootstrap/cache && \
            mkdir -p storage/framework/cache && \
            php8.5 artisan optimize:clear && \
            composer dump-autoload && \
            pnpm install && \
            pnpm run build && \
            php8.5 artisan config:clear && \
            php8.5 artisan view:clear && \
            php8.5 artisan route:clear && \
            php8.5 artisan config:cache && \
            php8.5 artisan route:cache && \
            php8.5 artisan view:cache && \
            sudo service php8.5-fpm restart
            "

