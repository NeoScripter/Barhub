name: deploy

on:
  push:
    branches:
      - develop
      - main
  # workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: 157.22.175.153
          port: 22
          username: ilya
          key: ${{ secrets.PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            cd www/lk.barhub.ru || exit 1

            echo "Pulling latest code..."
            git pull origin main

            echo "Installing dependencies..."
            composer install --no-dev --optimize-autoloader --classmap-authoritative

            echo "Installing frontend dependencies..."
            npm install
            npm run build

            echo "Clearing and rebuilding caches..."
            rm -rf storage/wayfinder-cache
            rm -rf storage/framework/surveyor
            rm -rf storage/framework/cache
            rm -rf bootstrap/cache
            mkdir -p bootstrap/cache
            mkdir -p storage/framework/cache

            php8.5 artisan optimize:clear
            php8.5 artisan config:cache
            php8.5 artisan route:cache
            php8.5 artisan view:cache

            echo "Reloading PHP-FPM..."
            sudo service php8.5-fpm reload

